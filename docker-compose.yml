name: condocharge

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      CONDOCHARGE_ENV: ${CONDOCHARGE_ENV:-development}
      CONDOCHARGE_API_HOST: 0.0.0.0
      CONDOCHARGE_API_PORT: 8000
      CONDOCHARGE_DATABASE_URL: ${CONDOCHARGE_DATABASE_URL:-sqlite+pysqlite:///./data/condocharge_dev.sqlite3}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - api_data:/app/data
    depends_on:
      - db

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-condocharge}
      POSTGRES_USER: ${POSTGRES_USER:-condocharge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-condocharge}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  api_data:
  pg_data:
